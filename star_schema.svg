  <text x="762" y="224" font-size="11" fill="#3d7ebf" font-weight="700">1</text>
  <text x="742" y="308" font-size="11" fill="#3d7ebf" font-weight="700">*</text>

  <text x="793" y="497" font-size="11" fill="#3d7ebf" font-weight="700">1</text>
  <text x="737" y="462" font-size="11" fill="#3d7ebf" font-weight="700">*</text>

  <text x="330" y="524" font-size="11" fill="#3d7ebf" font-weight="700">1</text>
  <text x="354" y="486" font-size="11" fill="#3d7ebf" font-weight="700">*</text>

  <text x="317" y="332" font-size="11" fill="#3d7ebf" font-weight="700">1</text>
