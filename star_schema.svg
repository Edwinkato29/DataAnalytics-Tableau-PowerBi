  <rect x="370" y="280" width="360" height="42" fill="#2255a0" rx="12"/>
  <rect x="370" y="310" width="360" height="12" fill="#2255a0"/>
  <text x="550" y="308" text-anchor="middle" font-size="15" font-weight="700" fill="#f0e68c" letter-spacing="0.5">⭐  fact_transactions</text>
  <!-- PK/FK fields -->
  <text x="390" y="342" font-size="12" font-weight="700" fill="#90caf9">🔑 TransactionID</text>
  <text x="570" y="342" font-size="11" fill="#b0bec5">PK · Surrogate Key</text>
  <line x1="385" y1="348" x2="715" y2="348" stroke="#2a5298" stroke-width="0.7"/>
  <text x="390" y="366" font-size="12" fill="#80deea">🔗 DateKey</text>
  <text x="570" y="366" font-size="11" fill="#b0bec5">FK → dim_date</text>
  <line x1="385" y1="372" x2="715" y2="372" stroke="#2a5298" stroke-width="0.7"/>
  <text x="390" y="390" font-size="12" fill="#80deea">🔗 AccountKey</text>
  <text x="570" y="390" font-size="11" fill="#b0bec5">FK → dim_accounts</text>
  <line x1="385" y1="396" x2="715" y2="396" stroke="#2a5298" stroke-width="0.7"/>
  <text x="390" y="414" font-size="12" fill="#80deea">🔗 DepartmentKey</text>
  <text x="570" y="414" font-size="11" fill="#b0bec5">FK → dim_departments</text>
  <line x1="385" y1="420" x2="715" y2="420" stroke="#2a5298" stroke-width="0.7"/>
  <text x="390" y="438" font-size="12" fill="#80deea">🔗 CostCenterKey</text>
  <text x="570" y="438" font-size="11" fill="#b0bec5">FK → dim_cost_centers</text>
  <line x1="385" y1="444" x2="715" y2="444" stroke="#2a5298" stroke-width="0.7"/>
