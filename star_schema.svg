  <text x="390" y="504" font-size="11.5" fill="#f8bbd0">📊 Amount (Actual)</text>
  <text x="390" y="521" font-size="11.5" fill="#f8bbd0">📊 BudgetAmount</text>
  <text x="390" y="538" font-size="11.5" fill="#f8bbd0">📊 FiscalYear / FiscalQuarter</text>
  <text x="540" y="487" font-size="11" fill="#b0bec5">Revenue | Expense</text>
  <text x="540" y="504" font-size="11" fill="#b0bec5">DECIMAL(18,2)</text>
  <text x="540" y="521" font-size="11" fill="#b0bec5">DECIMAL(18,2)</text>
  <text x="540" y="538" font-size="11" fill="#b0bec5">VARCHAR | VARCHAR</text>
