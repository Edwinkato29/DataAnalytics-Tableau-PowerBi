<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" height="820" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="factGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f2548;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e6655;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a4d3f;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3d7ebf"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7fb3d3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#f0f4f8" rx="16"/>

  <!-- Title Banner -->
  <rect x="0" y="0" width="1100" height="60" fill="#1a3a6b" rx="16"/>
  <rect x="0" y="44" width="1100" height="16" fill="#1a3a6b"/>
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="white" letter-spacing="1">Financial Performance Dashboard — Star Schema Model</text>

  <!-- Legend -->
  <rect x="30" y="76" width="18" height="18" fill="#1a3a6b" rx="4"/>
  <text x="54" y="90" font-size="13" fill="#333">Fact Table</text>
  <rect x="145" y="76" width="18" height="18" fill="#0e6655" rx="4"/>
  <text x="169" y="90" font-size="13" fill="#333">Dimension Tables</text>
  <line x1="290" y1="85" x2="330" y2="85" stroke="#3d7ebf" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="340" y="90" font-size="13" fill="#333">Relationship (FK → PK)</text>

  <!-- ========== FACT TABLE (center) ========== -->
